<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>KORRUPTION</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --bg1: #101910;
      --bg2: #1f321e;
      --bg3: #f4c95d;
      --card: rgba(255, 255, 255, 0.90);
      --ink: #182318;
      --muted: #647264;
      --green: #244e2c;
      --green2: #3d7c48;
      --gold: #f1bf36;
      --red: #a9322b;
      --soft: rgba(255,255,255,.76);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      font-family: Arial, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 15% 10%, rgba(241,191,54,.30), transparent 30%),
        radial-gradient(circle at 85% 5%, rgba(111,190,115,.24), transparent 34%),
        linear-gradient(135deg, #0d130d, #172317 40%, #2c2a14 100%);
      color: var(--ink);
    }

    body {
      overscroll-behavior: none;
    }

    button,
    input,
    textarea,
    select {
      font-family: inherit;
    }

    .app {
      width: 100%;
      min-height: 100vh;
      padding: 12px;
      color: var(--ink);
    }

    .shell {
      width: min(980px, 100%);
      margin: 0 auto;
    }

    .hero {
      border-radius: 28px;
      padding: 16px;
      color: white;
      background:
        linear-gradient(135deg, rgba(255,255,255,.12), rgba(255,255,255,.03)),
        linear-gradient(135deg, #122512, #263d20 58%, #5a4211);
      border: 1px solid rgba(255,255,255,.18);
      box-shadow: 0 18px 50px rgba(0,0,0,.35);
      position: relative;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .hero::before {
      content: "★ ▲ ● ■";
      position: absolute;
      right: -18px;
      top: -8px;
      font-size: 70px;
      opacity: .10;
      transform: rotate(-10deg);
      letter-spacing: -10px;
      font-weight: 950;
    }

    .title {
      position: relative;
      font-size: clamp(34px, 10vw, 68px);
      line-height: .88;
      letter-spacing: -2px;
      font-weight: 1000;
      text-transform: uppercase;
      text-shadow: 0 4px 20px rgba(0,0,0,.45);
    }

    .subtitle {
      position: relative;
      margin-top: 8px;
      color: rgba(255,255,255,.78);
      font-weight: 850;
      font-size: 14px;
    }

    .top-row {
      position: relative;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    .room-chip {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 8px 11px;
      border-radius: 999px;
      background: rgba(255,255,255,.12);
      color: white;
      border: 1px solid rgba(255,255,255,.18);
      font-weight: 950;
      font-size: 13px;
    }

    .card {
      background: var(--card);
      border: 1px solid rgba(255,255,255,.55);
      border-radius: 22px;
      box-shadow: 0 10px 28px rgba(0,0,0,.16);
      padding: 13px;
      margin: 10px 0;
      backdrop-filter: blur(10px);
    }

    .card.dark {
      background: rgba(15, 25, 14, .80);
      border-color: rgba(255,255,255,.16);
      color: white;
    }

    .section-title {
      font-size: 18px;
      font-weight: 1000;
      color: #18391e;
      margin: 0 0 9px;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .dark .section-title {
      color: #f9dd80;
    }

    .muted {
      color: var(--muted);
      font-size: 13px;
      font-weight: 750;
      line-height: 1.25;
    }

    .dark .muted {
      color: rgba(255,255,255,.70);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(126px, 1fr));
      gap: 9px;
    }

    .two {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    .field {
      display: grid;
      gap: 5px;
      color: #50614f;
      font-size: 12px;
      font-weight: 950;
    }

    .dark .field {
      color: rgba(255,255,255,.72);
    }

    input,
    textarea,
    select {
      width: 100%;
      min-height: 44px;
      border: 1px solid rgba(24,35,24,.16);
      border-radius: 15px;
      padding: 10px 11px;
      color: var(--ink);
      background: rgba(255,255,255,.94);
      font-size: 16px;
      font-weight: 850;
      outline: none;
    }

    textarea {
      min-height: 88px;
      resize: vertical;
      line-height: 1.25;
    }

    .btn {
      border: 0;
      border-radius: 16px;
      padding: 11px 13px;
      background: var(--green);
      color: white;
      font-size: 15px;
      font-weight: 1000;
      box-shadow: 0 4px 0 rgba(0,0,0,.18);
      cursor: pointer;
    }

    .btn:active {
      transform: translateY(1px);
      box-shadow: 0 2px 0 rgba(0,0,0,.20);
    }

    .btn.gold {
      background: var(--gold);
      color: #382a05;
    }

    .btn.red {
      background: var(--red);
      color: white;
    }

    .btn.light {
      background: #eef6ed;
      color: #213b26;
      border: 1px solid rgba(24,35,24,.14);
    }

    .btn.small {
      padding: 8px 10px;
      border-radius: 13px;
      font-size: 13px;
    }

    .btn.full {
      width: 100%;
    }

    .btn:disabled {
      opacity: .45;
      cursor: not-allowed;
    }

    .symbol {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 46px;
      height: 46px;
      font-size: 42px;
      line-height: 1;
      font-weight: 1000;
      color: var(--sym);
      text-shadow:
        0 1px 0 rgba(255,255,255,.85),
        0 3px 10px rgba(0,0,0,.22);
      flex: 0 0 auto;
    }

    .symbol.small {
      width: 32px;
      height: 32px;
      font-size: 30px;
    }

    .player-card {
      display: grid;
      gap: 7px;
      justify-items: center;
      text-align: center;
      padding: 12px 8px;
      border-radius: 18px;
      background: rgba(255,255,255,.72);
      border: 1px solid rgba(24,35,24,.12);
    }

    .player-card.me {
      background: rgba(222, 250, 222, .85);
      outline: 3px solid rgba(61,124,72,.24);
    }

    .player-card.bot {
      background: rgba(255, 245, 202, .82);
      outline: 2px dashed rgba(120, 90, 10, .30);
    }

    .player-name {
      font-weight: 1000;
      color: #172317;
      word-break: break-word;
    }

    .score {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 5px 8px;
      border-radius: 999px;
      background: #fff2bd;
      color: #604500;
      font-weight: 1000;
      font-size: 13px;
    }

    .vote-card {
      min-height: 92px;
      border: 1px solid rgba(24,35,24,.12);
      border-radius: 20px;
      background: rgba(255,255,255,.80);
      display: grid;
      gap: 5px;
      justify-items: center;
      align-content: center;
      padding: 10px;
      color: var(--ink);
      box-shadow: 0 6px 14px rgba(0,0,0,.08);
    }

    .vote-card.selected {
      outline: 4px solid var(--gold);
      background: #fff8dd;
    }

    .vote-card.voted {
      opacity: .72;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 6px 9px;
      font-size: 12px;
      font-weight: 1000;
      background: #edf5ed;
      color: #213b26;
      border: 1px solid rgba(24,35,24,.12);
    }

    .badge.gold {
      background: #fff2bd;
      color: #604500;
    }

    .badge.red {
      background: #ffe1de;
      color: #7c2119;
    }

    .badge.dark {
      background: rgba(255,255,255,.12);
      color: white;
      border-color: rgba(255,255,255,.14);
    }

    .message {
      position: sticky;
      top: 0;
      z-index: 100;
      margin-bottom: 10px;
      padding: 10px 12px;
      border-radius: 16px;
      background: #fff7cf;
      color: #4d3a04;
      border: 1px solid rgba(160, 125, 20, .25);
      font-weight: 900;
      box-shadow: 0 6px 18px rgba(0,0,0,.12);
    }

    .hidden {
      display: none !important;
    }

    .result-row {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 8px;
      padding: 9px;
      border-radius: 16px;
      background: rgba(255,255,255,.75);
      border: 1px solid rgba(24,35,24,.12);
      margin: 6px 0;
    }

    .note-item {
      display: grid;
      gap: 5px;
      padding: 9px;
      border-radius: 16px;
      background: rgba(255,255,255,.78);
      border: 1px solid rgba(24,35,24,.12);
      margin: 7px 0;
    }

    .note-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .rules-list {
      display: grid;
      gap: 7px;
      margin: 0;
      padding-left: 18px;
      font-weight: 800;
      line-height: 1.3;
    }

    .footer-space {
      height: 30px;
    }

    @media (max-width: 720px) {
      .app {
        padding: 9px;
      }

      .two {
        grid-template-columns: 1fr;
      }

      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .title {
        font-size: 42px;
      }

      .hero {
        border-radius: 24px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="shell">
      <div id="message"></div>

      <div class="hero">
        <div class="top-row">
          <div>
            <div class="title">KORRUPTION</div>
            <div class="subtitle">real-life deals · phone voting · shared scoreboard</div>
          </div>
          <div id="heroChips"></div>
        </div>
      </div>

      <main id="app"></main>
      <div class="footer-space"></div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://xnwwngqennvwajlhvclj.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhud3duZ3Flbm52d2FqbGh2Y2xqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0NTIxMDIsImV4cCI6MjA5NjAyODEwMn0.dnrzfKp9xvJ7WXQojwTSa89_HU6r1d9-gtEtYY-dyIM";

    const ROUND_PAYOUTS = [0, 20, 25, 30, 35, 40, 50];
    const VOTER_BONUS = 3;
    const MAX_ROUNDS = 6;

    const TEST_BOT_NAMES = [
      "Viper", "Moxie", "Rook", "Hex", "Ivy", "Knox", "Jinx", "Ace",
      "Raven", "Slate", "Nova", "Cash", "Echo", "Rex", "Zed"
    ];

    const COLORS = [
      { name: "Red", hex: "#e34848" },
      { name: "Blue", hex: "#407ee8" },
      { name: "Green", hex: "#35a857" },
      { name: "Yellow", hex: "#f0bf2f" }
    ];

    const SHAPES = [
      { name: "Circle", mark: "●" },
      { name: "Square", mark: "■" },
      { name: "Triangle", mark: "▲" },
      { name: "Star", mark: "★" }
    ];

    const IDENTITY_DECK = COLORS.flatMap(function (color) {
      return SHAPES.map(function (shape) {
        return {
          color: color.name,
          colorHex: color.hex,
          shape: shape.name,
          mark: shape.mark
        };
      });
    });

    const STORAGE_KEY = "korruption_v1_player";
    const configured =
      !SUPABASE_URL.includes("PASTE_") &&
      !SUPABASE_ANON_KEY.includes("PASTE_");

    let db = null;
    let channel = null;
    let loadTimer = null;

    const appState = {
      room: null,
      players: [],
      votes: [],
      notes: [],
      me: loadLocalPlayer(),
      selectedVote: "",
      message: "",
      loading: false
    };

    if (configured && window.supabase) {
      db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    }

    function $(id) {
      return document.getElementById(id);
    }

    function esc(value) {
      return String(value == null ? "" : value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function makeToken() {
      if (window.crypto && window.crypto.randomUUID) {
        return window.crypto.randomUUID();
      }

      return "tok-" + Date.now() + "-" + Math.random().toString(16).slice(2);
    }

    function roomCode() {
      const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
      let code = "K";

      for (let i = 0; i < 3; i += 1) {
        code += chars[Math.floor(Math.random() * chars.length)];
      }

      return code;
    }

    function normalizeRoomCode(value) {
      return String(value || "").trim().toUpperCase().replace(/[^A-Z0-9]/g, "").slice(0, 8);
    }

    function money(value) {
      return "🪙" + Math.max(0, Math.floor(Number(value) || 0));
    }

    function getPayout(round) {
      return ROUND_PAYOUTS[round] || ROUND_PAYOUTS[ROUND_PAYOUTS.length - 1];
    }

    function loadLocalPlayer() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch (e) {
        return null;
      }
    }

    function saveLocalPlayer() {
      if (!appState.me) {
        localStorage.removeItem(STORAGE_KEY);
        return;
      }

      localStorage.setItem(STORAGE_KEY, JSON.stringify(appState.me));
    }

    function clearLocalPlayer() {
      appState.me = null;
      saveLocalPlayer();
    }

    function setMessage(text) {
      appState.message = text || "";
      renderMessage();
    }

    function renderMessage() {
      const holder = $("message");
      if (!holder) return;

      holder.innerHTML = appState.message
        ? "<div class=\"message\">" + esc(appState.message) + "</div>"
        : "";
    }

    function playerById(id) {
