<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>KORRUPTION</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --bg1: #101910;
      --bg2: #1f321e;
      --bg3: #f4c95d;
      --card: rgba(255, 255, 255, 0.90);
      --ink: #182318;
      --muted: #647264;
      --green: #244e2c;
      --green2: #3d7c48;
      --gold: #f1bf36;
      --red: #a9322b;
      --soft: rgba(255,255,255,.76);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      font-family: Arial, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 15% 10%, rgba(241,191,54,.30), transparent 30%),
        radial-gradient(circle at 85% 5%, rgba(111,190,115,.24), transparent 34%),
        linear-gradient(135deg, #0d130d, #172317 40%, #2c2a14 100%);
      color: var(--ink);
    }

    body {
      overscroll-behavior: none;
    }

    button,
    input,
    textarea,
    select {
      font-family: inherit;
    }

    .app {
      width: 100%;
      min-height: 100vh;
      padding: 12px;
      color: var(--ink);
    }

    .shell {
      width: min(980px, 100%);
      margin: 0 auto;
    }

    .hero {
      border-radius: 28px;
      padding: 16px;
      color: white;
      background:
        linear-gradient(135deg, rgba(255,255,255,.12), rgba(255,255,255,.03)),
        linear-gradient(135deg, #122512, #263d20 58%, #5a4211);
      border: 1px solid rgba(255,255,255,.18);
      box-shadow: 0 18px 50px rgba(0,0,0,.35);
      position: relative;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .hero::before {
      content: "★ ▲ ● ■";
      position: absolute;
      right: -18px;
      top: -8px;
      font-size: 70px;
      opacity: .10;
      transform: rotate(-10deg);
      letter-spacing: -10px;
      font-weight: 950;
    }

    .title {
      position: relative;
      font-size: clamp(34px, 10vw, 68px);
      line-height: .88;
      letter-spacing: -2px;
      font-weight: 1000;
      text-transform: uppercase;
      text-shadow: 0 4px 20px rgba(0,0,0,.45);
    }

    .subtitle {
      position: relative;
      margin-top: 8px;
      color: rgba(255,255,255,.78);
      font-weight: 850;
      font-size: 14px;
    }

    .top-row {
      position: relative;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    .room-chip {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 8px 11px;
      border-radius: 999px;
      background: rgba(255,255,255,.12);
      color: white;
      border: 1px solid rgba(255,255,255,.18);
      font-weight: 950;
      font-size: 13px;
    }

    .card {
      background: var(--card);
      border: 1px solid rgba(255,255,255,.55);
      border-radius: 22px;
      box-shadow: 0 10px 28px rgba(0,0,0,.16);
      padding: 13px;
      margin: 10px 0;
      backdrop-filter: blur(10px);
    }

    .card.dark {
      background: rgba(15, 25, 14, .80);
      border-color: rgba(255,255,255,.16);
      color: white;
    }

    .section-title {
      font-size: 18px;
      font-weight: 1000;
      color: #18391e;
      margin: 0 0 9px;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .dark .section-title {
      color: #f9dd80;
    }

    .muted {
      color: var(--muted);
      font-size: 13px;
      font-weight: 750;
      line-height: 1.25;
    }

    .dark .muted {
      color: rgba(255,255,255,.70);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(126px, 1fr));
      gap: 9px;
    }

    .two {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    .field {
      display: grid;
      gap: 5px;
      color: #50614f;
      font-size: 12px;
      font-weight: 950;
    }

    .dark .field {
      color: rgba(255,255,255,.72);
    }

    input,
    textarea,
    select {
      width: 100%;
      min-height: 44px;
      border: 1px solid rgba(24,35,24,.16);
      border-radius: 15px;
      padding: 10px 11px;
      color: var(--ink);
      background: rgba(255,255,255,.94);
      font-size: 16px;
      font-weight: 850;
      outline: none;
    }

    textarea {
      min-height: 88px;
      resize: vertical;
      line-height: 1.25;
    }

    .btn {
      border: 0;
      border-radius: 16px;
      padding: 11px 13px;
      background: var(--green);
      color: white;
      font-size: 15px;
      font-weight: 1000;
      box-shadow: 0 4px 0 rgba(0,0,0,.18);
      cursor: pointer;
    }

    .btn:active {
      transform: translateY(1px);
      box-shadow: 0 2px 0 rgba(0,0,0,.20);
    }

    .btn.gold {
      background: var(--gold);
      color: #382a05;
    }

    .btn.red {
      background: var(--red);
      color: white;
    }

    .btn.light {
      background: #eef6ed;
      color: #213b26;
      border: 1px solid rgba(24,35,24,.14);
    }

    .btn.small {
      padding: 8px 10px;
      border-radius: 13px;
      font-size: 13px;
    }

    .btn.full {
      width: 100%;
    }

    .btn:disabled {
      opacity: .45;
      cursor: not-allowed;
    }

    .symbol {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 46px;
      height: 46px;
      font-size: 42px;
      line-height: 1;
      font-weight: 1000;
      color: var(--sym);
      text-shadow:
        0 1px 0 rgba(255,255,255,.85),
        0 3px 10px rgba(0,0,0,.22);
      flex: 0 0 auto;
    }

    .symbol.small {
      width: 32px;
      height: 32px;
      font-size: 30px;
    }

    .player-card {
      display: grid;
      gap: 7px;
      justify-items: center;
      text-align: center;
      padding: 12px 8px;
      border-radius: 18px;
      background: rgba(255,255,255,.72);
      border: 1px solid rgba(24,35,24,.12);
    }

    .player-card.me {
      background: rgba(222, 250, 222, .85);
      outline: 3px solid rgba(61,124,72,.24);
    }

    .player-name {
      font-weight: 1000;
      color: #172317;
      word-break: break-word;
    }

    .score {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 5px 8px;
      border-radius: 999px;
      background: #fff2bd;
      color: #604500;
      font-weight: 1000;
      font-size: 13px;
    }

    .vote-card {
      min-height: 92px;
      border: 1px solid rgba(24,35,24,.12);
      border-radius: 20px;
      background: rgba(255,255,255,.80);
      display: grid;
      gap: 5px;
      justify-items: center;
      align-content: center;
      padding: 10px;
      color: var(--ink);
      box-shadow: 0 6px 14px rgba(0,0,0,.08);
    }

    .vote-card.selected {
      outline: 4px solid var(--gold);
      background: #fff8dd;
    }

    .vote-card.voted {
      opacity: .72;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 6px 9px;
      font-size: 12px;
      font-weight: 1000;
      background: #edf5ed;
      color: #213b26;
      border: 1px solid rgba(24,35,24,.12);
    }

    .badge.gold {
      background: #fff2bd;
      color: #604500;
    }

    .badge.red {
      background: #ffe1de;
      color: #7c2119;
    }

    .badge.dark {
      background: rgba(255,255,255,.12);
      color: white;
      border-color: rgba(255,255,255,.14);
    }

    .message {
      position: sticky;
      top: 0;
      z-index: 100;
      margin-bottom: 10px;
      padding: 10px 12px;
      border-radius: 16px;
      background: #fff7cf;
      color: #4d3a04;
      border: 1px solid rgba(160, 125, 20, .25);
      font-weight: 900;
      box-shadow: 0 6px 18px rgba(0,0,0,.12);
    }

    .hidden {
      display: none !important;
    }

    .result-row {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 8px;
      padding: 9px;
      border-radius: 16px;
      background: rgba(255,255,255,.75);
      border: 1px solid rgba(24,35,24,.12);
      margin: 6px 0;
    }

    .note-item {
      display: grid;
      gap: 5px;
      padding: 9px;
      border-radius: 16px;
      background: rgba(255,255,255,.78);
      border: 1px solid rgba(24,35,24,.12);
      margin: 7px 0;
    }

    .note-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .rules-list {
      display: grid;
      gap: 7px;
      margin: 0;
      padding-left: 18px;
      font-weight: 800;
      line-height: 1.3;
    }

    .footer-space {
      height: 30px;
    }

    @media (max-width: 720px) {
      .app {
        padding: 9px;
      }

      .two {
        grid-template-columns: 1fr;
      }

      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .title {
        font-size: 42px;
      }

      .hero {
        border-radius: 24px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="shell">
      <div id="message"></div>

      <div class="hero">
        <div class="top-row">
          <div>
            <div class="title">KORRUPTION</div>
            <div class="subtitle">real-life deals · phone voting · shared scoreboard</div>
          </div>
          <div id="heroChips"></div>
        </div>
      </div>

      <main id="app"></main>
      <div class="footer-space"></div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://xnwwngqennvwajlhvclj.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhud3duZ3Flbm52d2FqbGh2Y2xqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0NTIxMDIsImV4cCI6MjA5NjAyODEwMn0.dnrzfKp9xvJ7WXQojwTSa89_HU6r1d9-gtEtYY-dyIM";

    const ROUND_PAYOUTS = [0, 20, 25, 30, 35, 40, 50];
    const VOTER_BONUS = 3;
    const MAX_ROUNDS = 6;

    const COLORS = [
      { name: "Red", hex: "#e34848" },
      { name: "Blue", hex: "#407ee8" },
      { name: "Green", hex: "#35a857" },
      { name: "Yellow", hex: "#f0bf2f" }
    ];

    const SHAPES = [
      { name: "Circle", mark: "●" },
      { name: "Square", mark: "■" },
      { name: "Triangle", mark: "▲" },
      { name: "Star", mark: "★" }
    ];

    const IDENTITY_DECK = COLORS.flatMap(function (color) {
      return SHAPES.map(function (shape) {
        return {
          color: color.name,
          colorHex: color.hex,
          shape: shape.name,
          mark: shape.mark
        };
      });
    });

    const STORAGE_KEY = "korruption_v1_player";
    const configured =
      !SUPABASE_URL.includes("PASTE_") &&
      !SUPABASE_ANON_KEY.includes("PASTE_");

    let db = null;
    let channel = null;
    let loadTimer = null;

    const appState = {
      room: null,
      players: [],
      votes: [],
      notes: [],
      me: loadLocalPlayer(),
      selectedVote: "",
      message: "",
      loading: false
    };

    if (configured && window.supabase) {
      db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    }

    function $(id) {
      return document.getElementById(id);
    }

    function esc(value) {
      return String(value == null ? "" : value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function makeToken() {
      if (crypto && crypto.randomUUID) return crypto.randomUUID();

      return "tok-" + Date.now() + "-" + Math.random().toString(16).slice(2);
    }

    function roomCode() {
      const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
      let code = "K";

      for (let i = 0; i < 3; i += 1) {
        code += chars[Math.floor(Math.random() * chars.length)];
      }

      return code;
    }

    function normalizeRoomCode(value) {
      return String(value || "").trim().toUpperCase().replace(/[^A-Z0-9]/g, "").slice(0, 8);
    }

    function money(value) {
      return "🪙" + Math.max(0, Math.floor(Number(value) || 0));
    }

    function getPayout(round) {
      return ROUND_PAYOUTS[round] || ROUND_PAYOUTS[ROUND_PAYOUTS.length - 1];
    }

    function loadLocalPlayer() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch (e) {
        return null;
      }
    }

    function saveLocalPlayer() {
      if (!appState.me) {
        localStorage.removeItem(STORAGE_KEY);
        return;
      }

      localStorage.setItem(STORAGE_KEY, JSON.stringify(appState.me));
    }

    function clearLocalPlayer() {
      appState.me = null;
      saveLocalPlayer();
    }

    function setMessage(text) {
      appState.message = text || "";
      renderMessage();
    }

    function renderMessage() {
      const holder = $("message");
      if (!holder) return;

      holder.innerHTML = appState.message
        ? "<div class=\"message\">" + esc(appState.message) + "</div>"
        : "";
    }

    function playerById(id) {
      return appState.players.find(function (p) {
        return p.id === id;
      }) || null;
    }

    function myPlayer() {
      if (!appState.me) return null;
      return playerById(appState.me.playerId);
    }

    function amHost() {
      return !!(
        appState.room &&
        appState.me &&
        appState.me.hostToken &&
        appState.me.hostToken === appState.room.host_token
      );
    }

    function identityFor(player) {
      if (!player) return null;

      const color = COLORS.find(function (c) {
        return c.name === player.color;
      }) || COLORS[0];

      const shape = SHAPES.find(function (s) {
        return s.name === player.shape;
      }) || SHAPES[0];

      return {
        color: color.name,
        hex: color.hex,
        shape: shape.name,
        mark: shape.mark
      };
    }

    function symbolHtml(player, small) {
      const ident = identityFor(player);
      if (!ident) return "";

      return (
        "<span class=\"symbol" + (small ? " small" : "") + "\" " +
          "style=\"--sym:" + esc(ident.hex) + "\" " +
          "title=\"" + esc(ident.color + " " + ident.shape) + "\">" +
          esc(ident.mark) +
        "</span>"
      );
    }

    function playerLabel(player) {
      if (!player) return "Unknown";
      return identityFor(player).color + " " + identityFor(player).shape + " · " + player.player_name;
    }

    function firstOpenIdentity(players) {
      const used = new Set(players.map(function (p) {
        return p.color + "|" + p.shape;
      }));

      return IDENTITY_DECK.find(function (ident) {
        return !used.has(ident.color + "|" + ident.shape);
      }) || null;
    }

    async function createRoom() {
  try {
    setMessage("Creating room...");

    if (!configured) {
      setMessage("Supabase URL/key are missing in index.html.");
      return;
    }

    if (!window.supabase) {
      setMessage("Supabase script did not load. Check internet or CDN script.");
      return;
    }

    if (!db) {
      db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    }

    const nameInput = $("createName");
    const name = (nameInput && nameInput.value ? nameInput.value : "").trim();

    if (!name) {
      setMessage("Enter your name first.");
      return;
    }

    const hostToken = makeToken();
    const playerToken = makeToken();

    let code = roomCode();
    let room = null;
    let lastError = null;

    for (let tries = 0; tries < 8; tries += 1) {
      code = roomCode();

      const insertRoom = await db
        .from("korr_rooms")
        .insert({
          room_code: code,
          host_token: hostToken,
          status: "lobby",
          round_number: 1,
          max_rounds: MAX_ROUNDS
        })
        .select()
        .single();

      if (!insertRoom.error) {
        room = insertRoom.data;
        break;
      }

      lastError = insertRoom.error;
      console.log("Create room error:", insertRoom.error);
    }

    if (!room) {
      setMessage("Room table error: " + (lastError ? lastError.message : "unknown error"));
      return;
    }

    const ident = IDENTITY_DECK[0];

    const insertPlayer = await db
      .from("korr_players")
      .insert({
        room_code: code,
        player_name: name,
        player_token: playerToken,
        color: ident.color,
        shape: ident.shape,
        score: 0
      })
      .select()
      .single();

    if (insertPlayer.error) {
      console.log("Create player error:", insertPlayer.error);
      setMessage("Player table error: " + insertPlayer.error.message);
      return;
    }

    appState.me = {
      roomCode: code,
      playerId: insertPlayer.data.id,
      playerToken: playerToken,
      hostToken: hostToken
    };

    saveLocalPlayer();
    setMessage("Room created: " + code);
    await loadAll();
    subscribeRoom();
  } catch (err) {
    console.log("Create room crashed:", err);
    setMessage("Create room crashed: " + (err && err.message ? err.message : String(err)));
  }
}

    async function joinRoom() {
      if (!checkConfigured()) return;

      const name = ($("joinName").value || "").trim();
      const code = normalizeRoomCode($("joinCode").value);

      if (!name) {
        setMessage("Enter your name first.");
        return;
      }

      if (!code) {
        setMessage("Enter the room code.");
        return;
      }

      const roomRes = await db
        .from("korr_rooms")
        .select("*")
        .eq("room_code", code)
        .maybeSingle();

      if (roomRes.error || !roomRes.data) {
        setMessage("Room not found.");
        return;
      }

      const playersRes = await db
        .from("korr_players")
        .select("*")
        .eq("room_code", code)
        .order("joined_at", { ascending: true });

      if (playersRes.error) {
        setMessage(playersRes.error.message);
        return;
      }

      const ident = firstOpenIdentity(playersRes.data || []);

      if (!ident) {
        setMessage("Room is full. Max is 16 players.");
        return;
      }

      const playerToken = makeToken();

      const playerRes = await db
        .from("korr_players")
        .insert({
          room_code: code,
          player_name: name,
          player_token: playerToken,
          color: ident.color,
          shape: ident.shape,
          score: 0
        })
        .select()
        .single();

      if (playerRes.error) {
        setMessage(playerRes.error.message);
        return;
      }

      appState.me = {
        roomCode: code,
        playerId: playerRes.data.id,
        playerToken: playerToken,
        hostToken: ""
      };

      saveLocalPlayer();
      setMessage("Joined room " + code + ".");
      await loadAll();
      subscribeRoom();
    }

    async function loadAll() {
      if (!checkConfigured(false)) {
        render();
        return;
      }

      if (!appState.me || !appState.me.roomCode) {
        render();
        return;
      }

      appState.loading = true;
      render();

      const code = appState.me.roomCode;

      const roomRes = await db
        .from("korr_rooms")
        .select("*")
        .eq("room_code", code)
        .maybeSingle();

      if (roomRes.error || !roomRes.data) {
        clearLocalPlayer();
        appState.room = null;
        appState.players = [];
        appState.votes = [];
        appState.notes = [];
        appState.loading = false;
        setMessage("Room was not found.");
        render();
        return;
      }

      appState.room = roomRes.data;

      const playersRes = await db
        .from("korr_players")
        .select("*")
        .eq("room_code", code)
        .order("joined_at", { ascending: true });

      if (!playersRes.error) {
        appState.players = playersRes.data || [];
      }

      const meStillExists = appState.players.some(function (p) {
        return p.id === appState.me.playerId;
      });

      if (!meStillExists) {
        clearLocalPlayer();
        appState.room = null;
        appState.players = [];
        appState.votes = [];
        appState.notes = [];
        appState.loading = false;
        setMessage("You are no longer in that room.");
        render();
        return;
      }

      const votesRes = await db
        .from("korr_votes")
        .select("*")
        .eq("room_code", code)
        .eq("round_number", appState.room.round_number);

      if (!votesRes.error) {
        appState.votes = votesRes.data || [];
      }

      const notesRes = await db
        .from("korr_deal_notes")
        .select("*")
        .eq("room_code", code)
        .eq("player_id", appState.me.playerId)
        .order("created_at", { ascending: false });

      if (!notesRes.error) {
        appState.notes = notesRes.data || [];
      }

      const myVote = appState.votes.find(function (v) {
        return v.voter_player_id === appState.me.playerId;
      });

      appState.selectedVote = myVote ? myVote.voted_for_player_id : "";

      appState.loading = false;
      render();
    }

    function scheduleLoad() {
      clearTimeout(loadTimer);
      loadTimer = setTimeout(loadAll, 220);
    }

    function subscribeRoom() {
      if (!db || !appState.me || !appState.me.roomCode) return;

      if (channel) {
        db.removeChannel(channel);
        channel = null;
      }

      const code = appState.me.roomCode;

      channel = db
        .channel("korruption-" + code)
        .on("postgres_changes", {
          event: "*",
          schema: "public",
          table: "korr_rooms",
          filter: "room_code=eq." + code
        }, scheduleLoad)
        .on("postgres_changes", {
          event: "*",
          schema: "public",
          table: "korr_players",
          filter: "room_code=eq." + code
        }, scheduleLoad)
        .on("postgres_changes", {
          event: "*",
          schema: "public",
          table: "korr_votes",
          filter: "room_code=eq." + code
        }, scheduleLoad)
        .on("postgres_changes", {
          event: "*",
          schema: "public",
          table: "korr_deal_notes",
          filter: "room_code=eq." + code
        }, scheduleLoad)
        .subscribe();
    }

    async function startVoting() {
      if (!amHost()) return;

      if (appState.players.length < 2) {
        setMessage("Need at least 2 players.");
        return;
      }

      const code = appState.room.room_code;
      const round = appState.room.round_number;

      await db
        .from("korr_votes")
        .delete()
        .eq("room_code", code)
        .eq("round_number", round);

      const roomRes = await db
        .from("korr_rooms")
        .update({
          status: "voting",
          last_result: null
        })
        .eq("room_code", code);

      if (roomRes.error) {
        setMessage(roomRes.error.message);
        return;
      }

      setMessage("Round " + round + " voting started.");
      await loadAll();
    }

    async function submitVote(playerId) {
      if (!appState.room || !appState.me) return;

      if (playerId === appState.me.playerId) {
        setMessage("You cannot vote for yourself.");
        return;
      }

      const voteRes = await db
        .from("korr_votes")
        .upsert({
          room_code: appState.room.room_code,
          round_number: appState.room.round_number,
          voter_player_id: appState.me.playerId,
          voted_for_player_id: playerId
        }, {
          onConflict: "room_code,round_number,voter_player_id"
        });

      if (voteRes.error) {
        setMessage(voteRes.error.message);
        return;
      }

      appState.selectedVote = playerId;
      setMessage("Vote saved.");
      await loadAll();
    }

    async function revealAndScore() {
      if (!amHost()) return;

      await loadAll();

      const room = appState.room;
      const votes = appState.votes;
      const players = appState.players;

      if (!votes.length) {
        setMessage("No votes yet.");
        return;
      }

      const counts = {};
      votes.forEach(function (vote) {
        counts[vote.voted_for_player_id] = (counts[vote.voted_for_player_id] || 0) + 1;
      });

      let max = 0;
      Object.keys(counts).forEach(function (id) {
        max = Math.max(max, counts[id]);
      });

      const winnerIds = Object.keys(counts).filter(function (id) {
        return counts[id] === max;
      });

      const payoutEach = Math.floor(getPayout(room.round_number) / Math.max(1, winnerIds.length));
      const deltas = {};

      players.forEach(function (p) {
        deltas[p.id] = 0;
      });

      winnerIds.forEach(function (id) {
        deltas[id] += payoutEach;
      });

      votes.forEach(function (vote) {
        const votedForWinner = winnerIds.includes(vote.voted_for_player_id);
        const voterIsWinner = winnerIds.includes(vote.voter_player_id);

        if (votedForWinner && !voterIsWinner) {
          deltas[vote.voter_player_id] += VOTER_BONUS;
        }
      });

      for (const player of players) {
        const newScore = Number(player.score || 0) + Number(deltas[player.id] || 0);

        const scoreRes = await db
          .from("korr_players")
          .update({ score: newScore })
          .eq("id", player.id);

        if (scoreRes.error) {
          setMessage(scoreRes.error.message);
          return;
        }
      }

      const result = {
        round: room.round_number,
        counts: counts,
        winnerIds: winnerIds,
        payoutEach: payoutEach,
        voterBonus: VOTER_BONUS,
        deltas: deltas,
        scoredAt: new Date().toISOString()
      };

      const roomRes = await db
        .from("korr_rooms")
        .update({
          status: "results",
          last_result: result
        })
        .eq("room_code", room.room_code);

      if (roomRes.error) {
        setMessage(roomRes.error.message);
        return;
      }

      setMessage("Round scored.");
      await loadAll();
    }

    async function nextRound() {
      if (!amHost()) return;

      const room = appState.room;

      if (room.round_number >= room.max_rounds) {
        const finalRes = await db
          .from("korr_rooms")
          .update({ status: "final" })
          .eq("room_code", room.room_code);

        if (finalRes.error) {
          setMessage(finalRes.error.message);
          return;
        }

        setMessage("Final results.");
        await loadAll();
        return;
      }

      const next = room.round_number + 1;

      await db
        .from("korr_votes")
        .delete()
        .eq("room_code", room.room_code)
        .eq("round_number", next);

      const roomRes = await db
        .from("korr_rooms")
        .update({
          status: "voting",
          round_number: next,
          last_result: null
        })
        .eq("room_code", room.room_code);

      if (roomRes.error) {
        setMessage(roomRes.error.message);
        return;
      }

      setMessage("Round " + next + " started.");
      await loadAll();
    }

    async function resetGame() {
      if (!amHost()) return;

      const ok = confirm("Reset scores, votes, and notes for this room?");
      if (!ok) return;

      const code = appState.room.room_code;

      await db.from("korr_votes").delete().eq("room_code", code);
      await db.from("korr_deal_notes").delete().eq("room_code", code);

      for (const player of appState.players) {
        await db.from("korr_players").update({ score: 0 }).eq("id", player.id);
      }

      await db
        .from("korr_rooms")
        .update({
          status: "lobby",
          round_number: 1,
          last_result: null
        })
        .eq("room_code", code);

      setMessage("Game reset.");
      await loadAll();
    }

    async function saveNote() {
      const otherId = $("notePlayer").value;
      const noteText = ($("noteText").value || "").trim();

      if (!otherId) {
        setMessage("Pick who the note is about.");
        return;
      }

      if (!noteText) {
        setMessage("Type the note first.");
        return;
      }

      const noteRes = await db
        .from("korr_deal_notes")
        .insert({
          room_code: appState.room.room_code,
          round_number: appState.room.round_number,
          player_id: appState.me.playerId,
          player_token: appState.me.playerToken,
          other_player_id: otherId,
          note: noteText
        });

      if (noteRes.error) {
        setMessage(noteRes.error.message);
        return;
      }

      $("noteText").value = "";
      setMessage("Deal note saved.");
      await loadAll();
    }

    async function deleteNote(id) {
      const noteRes = await db
        .from("korr_deal_notes")
        .delete()
        .eq("id", id)
        .eq("player_id", appState.me.playerId);

      if (noteRes.error) {
        setMessage(noteRes.error.message);
        return;
      }

      setMessage("Note deleted.");
      await loadAll();
    }

    function checkConfigured(show) {
      if (show == null) show = true;

      if (!configured || !db) {
        if (show) {
          setMessage("Add your Supabase URL and anon/public key inside index.html first.");
        }
        return false;
      }

      return true;
    }

    function leaveLocal() {
      const ok = confirm("Leave this room on this phone?");
      if (!ok) return;

      clearLocalPlayer();
      appState.room = null;
      appState.players = [];
      appState.votes = [];
      appState.notes = [];
      appState.selectedVote = "";

      if (channel && db) {
        db.removeChannel(channel);
        channel = null;
      }

      render();
    }

    function copyRoom() {
      const code = appState.room ? appState.room.room_code : "";
      const link = location.origin + location.pathname + "?room=" + encodeURIComponent(code);

      if (navigator.clipboard) {
        navigator.clipboard.writeText(link);
        setMessage("Room link copied.");
      } else {
        setMessage("Room code: " + code);
      }
    }

    function renderHeroChips() {
      const holder = $("heroChips");
      if (!holder) return;

      if (!appState.room) {
        holder.innerHTML = "";
        return;
      }

      holder.innerHTML =
        "<div class=\"room-chip\">Room " + esc(appState.room.room_code) + "</div>" +
        "<div class=\"room-chip\">Round " + esc(appState.room.round_number) + "/" + esc(appState.room.max_rounds) + "</div>" +
        "<div class=\"room-chip\">" + esc(appState.room.status) + "</div>";
    }

    function render() {
      renderMessage();
      renderHeroChips();

      const root = $("app");

      if (appState.loading) {
        root.innerHTML =
          "<div class=\"card dark\">" +
            "<div class=\"section-title\">Loading...</div>" +
            "<div class=\"muted\">Syncing KORRUPTION room.</div>" +
          "</div>";
        return;
      }

      if (!appState.me || !appState.room) {
        root.innerHTML = renderSetup();
        wireSetup();
        return;
      }

      root.innerHTML = renderGame();
      wireGame();
    }

    function renderSetup() {
      const params = new URLSearchParams(location.search);
      const urlRoom = normalizeRoomCode(params.get("room") || "");

      return "" +
        "<div class=\"two\">" +
          "<div class=\"card\">" +
            "<div class=\"section-title\">Create room</div>" +
            "<div class=\"muted\">One person creates the room and becomes host.</div>" +
            "<br>" +
            "<label class=\"field\">Your name" +
              "<input id=\"createName\" placeholder=\"Beverly\" autocomplete=\"name\">" +
            "</label>" +
            "<br>" +
            "<button class=\"btn gold full\" id=\"createRoomBtn\">Create Room</button>" +
          "</div>" +

          "<div class=\"card\">" +
            "<div class=\"section-title\">Join room</div>" +
            "<div class=\"muted\">Everyone else enters the room code.</div>" +
            "<br>" +
            "<label class=\"field\">Your name" +
              "<input id=\"joinName\" placeholder=\"Player name\" autocomplete=\"name\">" +
            "</label>" +
            "<br>" +
            "<label class=\"field\">Room code" +
              "<input id=\"joinCode\" value=\"" + esc(urlRoom) + "\" placeholder=\"K7M4\" autocapitalize=\"characters\">" +
            "</label>" +
            "<br>" +
            "<button class=\"btn full\" id=\"joinRoomBtn\">Join Room</button>" +
          "</div>" +
        "</div>" +

        "<div class=\"card dark\">" +
          "<div class=\"section-title\">How this app works</div>" +
          "<ol class=\"rules-list\">" +
            "<li>Deals are made out loud, in person.</li>" +
            "<li>The app only handles player cards, votes, scores, and private deal notes.</li>" +
            "<li>Each person keeps the same colored symbol for the whole game.</li>" +
            "<li>Names stay visible. No fake hidden names.</li>" +
            "<li>Each round, everyone votes from their own phone.</li>" +
          "</ol>" +
        "</div>" +

        "<div class=\"card\">" +
          "<div class=\"section-title\">Supabase check</div>" +
          "<div class=\"muted\">" +
            (configured
              ? "Supabase is connected in the code."
              : "Supabase is not configured yet. Paste your Project URL and anon/public key at the top of index.html.") +
          "</div>" +
        "</div>";
    }

    function renderGame() {
      const me = myPlayer();
      const host = amHost();

      return "" +
        renderMeCard(me, host) +
        renderPlayersCard() +
        renderHostControls(host) +
        renderVotingCard() +
        renderResultsCard() +
        renderNotesCard() +
        renderRulesCard();
    }

    function renderMeCard(me, host) {
      return "" +
        "<div class=\"card dark\">" +
          "<div class=\"top-row\">" +
            "<div>" +
              "<div class=\"section-title\">You</div>" +
              "<div class=\"row\">" +
                symbolHtmlSafe(me, true) +
                "<span class=\"badge dark\">" + esc(me ? me.player_name : "") + "</span>" +
                "<span class=\"badge gold\">" + money(me ? me.score : 0) + "</span>" +
                (host ? "<span class=\"badge gold\">HOST</span>" : "") +
              "</div>" +
            "</div>" +
            "<div class=\"row\">" +
              "<button class=\"btn small gold\" id=\"copyRoomBtn\">Copy Room</button>" +
              "<button class=\"btn small red\" id=\"leaveBtn\">Leave</button>" +
            "</div>" +
          "</div>" +
        "</div>";
    }

    function symbolHtmlSafe(player, small) {
      return player ? symbolHtml(player, small) : "";
    }

    function renderPlayersCard() {
      const sorted = appState.players.slice().sort(function (a, b) {
        return Number(b.score || 0) - Number(a.score || 0);
      });

      return "" +
        "<div class=\"card\">" +
          "<div class=\"section-title\">Players</div>" +
          "<div class=\"grid\">" +
            sorted.map(function (p) {
              return "" +
                "<div class=\"player-card" + (p.id === appState.me.playerId ? " me" : "") + "\">" +
                  symbolHtml(p, false) +
                  "<div class=\"player-name\">" + esc(p.player_name) + "</div>" +
                  "<div class=\"score\">" + money(p.score) + "</div>" +
                "</div>";
            }).join("") +
          "</div>" +
        "</div>";
    }

    function renderHostControls(host) {
      if (!host) {
        return "" +
          "<div class=\"card\">" +
            "<div class=\"section-title\">Room status</div>" +
            "<div class=\"row\">" +
              "<span class=\"badge\">Round " + esc(appState.room.round_number) + "/" + esc(appState.room.max_rounds) + "</span>" +
              "<span class=\"badge gold\">" + esc(appState.room.status) + "</span>" +
              "<span class=\"badge\">" + appState.votes.length + "/" + appState.players.length + " votes</span>" +
            "</div>" +
          "</div>";
      }

      let controls = "";

      if (appState.room.status === "lobby") {
        controls =
          "<button class=\"btn gold\" id=\"startVotingBtn\">Start Voting</button>";
      } else if (appState.room.status === "voting") {
        controls =
          "<button class=\"btn gold\" id=\"revealBtn\">Reveal + Score</button>";
      } else if (appState.room.status === "results") {
        controls =
          "<button class=\"btn gold\" id=\"nextRoundBtn\">" +
            (appState.room.round_number >= appState.room.max_rounds ? "Final Results" : "Next Round") +
          "</button>";
      } else if (appState.room.status === "final") {
        controls =
          "<button class=\"btn gold\" id=\"resetBtn\">Reset Game</button>";
      }

      if (appState.room.status !== "final") {
        controls += " <button class=\"btn light\" id=\"resetBtn\">Reset</button>";
      }

      return "" +
        "<div class=\"card\">" +
          "<div class=\"section-title\">Host controls</div>" +
          "<div class=\"row\">" +
            "<span class=\"badge\">Round " + esc(appState.room.round_number) + "/" + esc(appState.room.max_rounds) + "</span>" +
            "<span class=\"badge gold\">" + esc(appState.room.status) + "</span>" +
            "<span class=\"badge\">" + appState.votes.length + "/" + appState.players.length + " votes</span>" +
          "</div>" +
          "<br>" +
          "<div class=\"row\">" + controls + "</div>" +
        "</div>";
    }

    function renderVotingCard() {
      if (appState.room.status !== "voting") {
        return "";
      }

      const me = myPlayer();

      const voteCards = appState.players
        .filter(function (p) {
          return p.id !== appState.me.playerId;
        })
        .map(function (p) {
          const selected = appState.selectedVote === p.id;

          return "" +
            "<button class=\"vote-card" + (selected ? " selected" : "") + "\" data-vote=\"" + esc(p.id) + "\">" +
              symbolHtml(p, false) +
              "<div class=\"player-name\">" + esc(p.player_name) + "</div>" +
              "<div class=\"muted\">" + esc(identityFor(p).color + " " + identityFor(p).shape) + "</div>" +
            "</button>";
        }).join("");

      const myVote = appState.votes.find(function (v) {
        return v.voter_player_id === appState.me.playerId;
      });

      return "" +
        "<div class=\"card\">" +
          "<div class=\"section-title\">Vote</div>" +
          "<div class=\"muted\">Pick who you are voting for this round. You can change it until the host reveals.</div>" +
          "<br>" +
          "<div class=\"grid\">" + voteCards + "</div>" +
          "<br>" +
          (myVote
            ? "<span class=\"badge gold\">Vote saved</span>"
            : "<span class=\"badge red\">No vote saved yet</span>") +
        "</div>";
    }

    function renderResultsCard() {
      if (appState.room.status !== "results" && appState.room.status !== "final") {
        return "";
      }

      const result = appState.room.last_result || null;

      if (!result) {
        return "" +
          "<div class=\"card\">" +
            "<div class=\"section-title\">Results</div>" +
            "<div class=\"muted\">No result saved yet.</div>" +
          "</div>";
      }

      const counts = result.counts || {};
      const winnerIds = result.winnerIds || [];
      const deltas = result.deltas || {};

      const voteRows = appState.players
        .slice()
        .sort(function (a, b) {
          return Number(counts[b.id] || 0) - Number(counts[a.id] || 0);
        })
        .map(function (p) {
          return "" +
            "<div class=\"result-row\">" +
              symbolHtml(p, true) +
              "<div>" +
                "<b>" + esc(p.player_name) + "</b>" +
                "<div class=\"muted\">" + esc(identityFor(p).color + " " + identityFor(p).shape) + "</div>" +
              "</div>" +
              "<div class=\"badge\">" + Number(counts[p.id] || 0) + " ✓</div>" +
            "</div>";
        }).join("");

      const winnerNames = winnerIds.map(function (id) {
        const p = playerById(id);
        return p ? symbolHtml(p, true) + " " + esc(p.player_name) : "";
      }).join(" ");

      const deltaRows = appState.players
        .filter(function (p) {
          return Number(deltas[p.id] || 0) > 0;
        })
        .map(function (p) {
          return "" +
            "<div class=\"result-row\">" +
              symbolHtml(p, true) +
              "<div><b>" + esc(p.player_name) + "</b></div>" +
              "<div class=\"badge gold\">+" + money(deltas[p.id]) + "</div>" +
            "</div>";
        }).join("");

      return "" +
        "<div class=\"card\">" +
          "<div class=\"section-title\">" + (appState.room.status === "final" ? "Final" : "Round Result") + "</div>" +
          "<div class=\"card dark\" style=\"margin-top:0\">" +
            "<div class=\"section-title\">🏆 Winner</div>" +
            "<div class=\"row\">" + winnerNames + "</div>" +
            "<br>" +
            "<div class=\"muted\">" +
              "Round payout: " + money(result.payoutEach || 0) +
              " · correct voter bonus: " + money(result.voterBonus || 0) +
            "</div>" +
          "</div>" +

          "<div class=\"section-title\">Votes</div>" +
          voteRows +

          "<div class=\"section-title\" style=\"margin-top:12px\">Score added</div>" +
          (deltaRows || "<div class=\"muted\">No score changes.</div>") +
        "</div>";
    }

    function renderNotesCard() {
      if (!appState.room || appState.room.status === "final") return "";

      const me = myPlayer();

      const otherOptions = appState.players
        .filter(function (p) {
          return p.id !== appState.me.playerId;
        })
        .map(function (p) {
          return "<option value=\"" + esc(p.id) + "\">" + esc(playerLabel(p)) + "</option>";
        }).join("");

      const notes = appState.notes
        .filter(function (note) {
          return Number(note.round_number) === Number(appState.room.round_number);
        })
        .map(function (note) {
          const other = playerById(note.other_player_id);

          return "" +
            "<div class=\"note-item\">" +
              "<div class=\"note-top\">" +
                "<div class=\"row\">" +
                  symbolHtmlSafe(other, true) +
                  "<b>" + esc(other ? other.player_name : "Player") + "</b>" +
                "</div>" +
                "<button class=\"btn small red\" data-delete-note=\"" + esc(note.id) + "\">×</button>" +
              "</div>" +
              "<div>" + esc(note.note) + "</div>" +
            "</div>";
        }).join("");

      return "" +
        "<div class=\"card\">" +
          "<div class=\"section-title\">Private deal notes</div>" +
          "<div class=\"muted\">These notes are only shown on this phone in the app. For casual family play only, not serious privacy.</div>" +
          "<br>" +
          "<label class=\"field\">Player" +
            "<select id=\"notePlayer\">" + otherOptions + "</select>" +
          "</label>" +
          "<br>" +
          "<label class=\"field\">Round " + esc(appState.room.round_number) + " note" +
            "<textarea id=\"noteText\" placeholder=\"Example: I give Lisa 10 if she votes for Nick.\"></textarea>" +
          "</label>" +
          "<br>" +
          "<button class=\"btn full\" id=\"saveNoteBtn\">Save Note</button>" +
          "<br><br>" +
          "<div class=\"section-title\">My round notes</div>" +
          (notes || "<div class=\"muted\">No notes for this round.</div>") +
        "</div>";
    }

    function renderRulesCard() {
      return "" +
        "<div class=\"card dark\">" +
          "<div class=\"section-title\">Rules starter</div>" +
          "<ol class=\"rules-list\">" +
            "<li>Players make deals in person.</li>" +
            "<li>Each player keeps the same name, color, and symbol all game.</li>" +
            "<li>Each round, everyone votes on their own phone.</li>" +
            "<li>The round winner gets that round's payout.</li>" +
            "<li>Anyone who voted for the winner gets a small bonus.</li>" +
            "<li>After 6 rounds, highest score wins.</li>" +
          "</ol>" +
        "</div>";
    }

    function wireSetup() {
      const createBtn = $("createRoomBtn");
      const joinBtn = $("joinRoomBtn");

      if (createBtn) createBtn.addEventListener("click", createRoom);
      if (joinBtn) joinBtn.addEventListener("click", joinRoom);
    }

    function wireGame() {
      const copyBtn = $("copyRoomBtn");
      const leaveBtn = $("leaveBtn");
      const startBtn = $("startVotingBtn");
      const revealBtn = $("revealBtn");
      const nextBtn = $("nextRoundBtn");
      const resetBtn = $("resetBtn");
      const saveNoteBtn = $("saveNoteBtn");

      if (copyBtn) copyBtn.addEventListener("click", copyRoom);
      if (leaveBtn) leaveBtn.addEventListener("click", leaveLocal);
      if (startBtn) startBtn.addEventListener("click", startVoting);
      if (revealBtn) revealBtn.addEventListener("click", revealAndScore);
      if (nextBtn) nextBtn.addEventListener("click", nextRound);
      if (resetBtn) resetBtn.addEventListener("click", resetGame);
      if (saveNoteBtn) saveNoteBtn.addEventListener("click", saveNote);

      document.querySelectorAll("[data-vote]").forEach(function (btn) {
        btn.addEventListener("click", function () {
          submitVote(btn.getAttribute("data-vote"));
        });
      });

      document.querySelectorAll("[data-delete-note]").forEach(function (btn) {
        btn.addEventListener("click", function () {
          deleteNote(btn.getAttribute("data-delete-note"));
        });
      });
    }

    async function boot() {
      render();

      if (!configured) {
        setMessage("Paste your Supabase URL and anon/public key in index.html.");
        return;
      }

      if (appState.me && appState.me.roomCode) {
        await loadAll();
        subscribeRoom();
      }
    }

    boot();
  </script>
</body>
</html>
